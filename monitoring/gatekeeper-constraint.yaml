# CVE-2025-1974 D2 — OPA/Gatekeeper Constraint
#
# ConstraintTemplate 적용 후 이 Constraint를 배포한다.
#
# ⚠️  탐지 범위:
#   kubectl apply 경로만 탐지됨 (kube-apiserver 경유 요청).
#   make attack-chain의 직접 webhook POST는 탐지 불가 → Falco D1/D3 사용.
#
# D2 탐지 트리거 방법:
#   kubectl apply -f - <<EOF
#   apiVersion: networking.k8s.io/v1
#   kind: Ingress
#   metadata:
#     name: test-d2
#     namespace: default
#     annotations:
#       nginx.ingress.kubernetes.io/auth-snippet: "include /etc/passwd;"
#   spec:
#     ingressClassName: nginx
#     rules:
#     - host: test.local
#       http:
#         paths:
#         - path: /
#           pathType: Prefix
#           backend:
#             service: {name: svc, port: {number: 80}}
#   EOF
#   # → warn 모드: 허용되지만 violation 기록
#   # → deny 모드: 요청 차단
#
# enforcementAction:
#   "warn"  — violation 기록만 (dry-run 모드, 탐지 팀 초기 단계)
#   "deny"  — 요청 차단 (방어 팀 적용 단계)
#
# violation 확인:
#   kubectl get blocknginxdangerousannotations -A
#   kubectl describe blocknginxdangerousannotations block-dangerous-nginx-annotations

apiVersion: constraints.gatekeeper.sh/v1beta1
kind: BlockNginxDangerousAnnotations
metadata:
  name: block-dangerous-nginx-annotations
  labels:
    detection: d2
    cve: cve-2025-1974
spec:
  enforcementAction: warn    # "deny"로 변경하면 요청 차단
  match:
    kinds:
    - apiGroups: ["networking.k8s.io"]
      kinds: ["Ingress"]
    namespaces: []           # 빈 배열 = 모든 네임스페이스
  parameters:
    blockedPatterns:
    - "include "
    - "load_module"
    - "/var/run/secrets/"
    - "/proc/self/"
    - ".so"
