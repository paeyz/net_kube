# CVE-2025-1974 Detection — Kubernetes Audit Log 정책
#
# ⚠️  탐지 범위 주의:
#   Audit Log는 kube-apiserver를 경유한 요청만 기록한다.
#   make attack-chain / make attack-enum 의 직접 webhook POST는
#   kube-apiserver를 우회하므로 D1/D2 관련 로그가 남지 않는다.
#
# 탐지 시나리오별 실제 적용 범위:
#   D2 (kubectl apply 경로): kubectl apply로 악성 Ingress 제출 시 requestObject 기록 ✓
#                             직접 webhook POST(make attack-chain) 시    → 미탐지 ✗
#   D4 (Lateral Movement):   탈취 토큰으로 kubectl --token get secrets 시 기록 ✓
#                             (T3는 kube-apiserver 경유이므로 정상 탐지됨)
#   D1 (unauthenticated):    kubectl apply 경로의 비인증 요청 기록 ✓
#                             직접 webhook POST → 미탐지 ✗ → Falco D1 사용
#
# 적용:
#   scripts/setup_audit_log.sh 실행
#   또는 minikube start 시 --extra-config 플래그로 전달
#
# 참고: https://kubernetes.io/docs/tasks/debug/debug-cluster/audit/

apiVersion: audit.k8s.io/v1
kind: Policy
rules:
  # ── D2: Ingress create/patch/update — requestObject 전체 기록 ────────────
  # auth-snippet annotation 포함 여부를 requestObject에서 확인 가능
  - level: RequestResponse
    verbs: ["create", "update", "patch", "delete"]
    resources:
    - group: "networking.k8s.io"
      resources: ["ingresses"]
    omitStages: []

  # ── D4: ingress-nginx SA의 민감 리소스 접근 기록 ─────────────────────────
  - level: Request
    users:
    - "system:serviceaccount:ingress-nginx:ingress-nginx"
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    resources:
    - group: ""
      resources: ["secrets", "configmaps", "serviceaccounts"]
    - group: "rbac.authorization.k8s.io"
      resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]

  # ── D1: system:unauthenticated의 API 접근 기록 ──────────────────────────
  # kubectl apply 경로에서 인증 없는 요청 기록 (direct webhook POST는 미탐지)
  - level: Request
    users: ["system:unauthenticated"]
    omitStages: []

  # ── 일반 민감 리소스 접근 (baseline 대비 이상 탐지) ────────────────────
  - level: Metadata
    resources:
    - group: ""
      resources: ["secrets"]
    verbs: ["get", "list", "watch"]

  # ── ServiceAccount 토큰 생성/삭제 ────────────────────────────────────────
  - level: Request
    resources:
    - group: ""
      resources: ["serviceaccounts/token"]
    verbs: ["create"]

  # ── 나머지: Metadata 레벨로 최소 기록 ────────────────────────────────────
  - level: Metadata
    omitStages:
    - RequestReceived
