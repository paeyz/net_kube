# CVE-2025-1974 Detection — Falco 커스텀 룰
#
# 탐지 시나리오:
#   D1: admission webhook direct access (파드에서 직접 8443 연결)
#   D3: nginx가 ServiceAccount token 파일 접근
#   D4: 컨테이너 내부에서 kubectl/curl로 Kubernetes API 접근
#
# 설치:
#   falco 네임스페이스에 이 파일을 ConfigMap으로 마운트하거나
#   scripts/setup_falco.sh 실행 시 자동 적용됨.
#
# 참고: https://falco.org/docs/rules/
#        https://github.com/falcosecurity/rules

# ─────────────────────────────────────────────────────────────────────────────
# D1: Webhook Direct Access
# 파드에서 ingress-nginx admission webhook 서비스(8443)에 직접 TCP 연결 시도
# ─────────────────────────────────────────────────────────────────────────────
- list: cve_2025_1974_webhook_ips
  items: [10.104.108.202, 10.244.0.5]

- list: cve_2025_1974_webhook_ports
  items: [443, 8443]

- rule: CVE-2025-1974 Webhook Direct Access
  desc: >
    클러스터 내 파드가 ingress-nginx admission webhook(8443)에
    직접 TCP 연결을 시도함. kube-apiserver를 통하지 않는 비정상 접근.
  condition: >
    evt.type=connect and
    (fd.typechar=4 or fd.typechar=6) and
    container and
    k8s.ns.name = default and
    (
      (fd.sip in (cve_2025_1974_webhook_ips) and
       fd.sport in (cve_2025_1974_webhook_ports)) or
      (fd.rip in (cve_2025_1974_webhook_ips) and
       fd.rport in (cve_2025_1974_webhook_ports)) or
      (proc.cmdline contains "ingress-nginx-controller-admission" and
       (fd.sport in (cve_2025_1974_webhook_ports) or
        fd.rport in (cve_2025_1974_webhook_ports)))
    )
  output: >
    Webhook direct connect detected
    (pod=%k8s.pod.name ns=%k8s.ns.name proc=%proc.name
     connection=%fd.name sport=%fd.sport rport=%fd.rport
     sip=%fd.sip rip=%fd.rip cmdline=%proc.cmdline)
  priority: CRITICAL
  tags: [cve-2025-1974, d1, webhook, network]

# ─────────────────────────────────────────────────────────────────────────────
# D3: nginx ServiceAccount Token File Access
# nginx 프로세스가 SA 토큰 파일을 열 때 탐지
# ─────────────────────────────────────────────────────────────────────────────
- rule: CVE-2025-1974 Nginx Reads ServiceAccount Token
  desc: >
    ingress-nginx controller의 nginx 프로세스가
    ServiceAccount 토큰 파일을 읽으려 시도함.
    auth-snippet include 주입의 핵심 증거.
  condition: >
    (open_read or open_write) and
    fd.name = "/var/run/secrets/kubernetes.io/serviceaccount/token" and
    proc.name in (nginx, nginx-ingress-co) and
    k8s.ns.name = ingress-nginx
  output: >
    nginx read SA token (CVE-2025-1974 D3)
    (pod=%k8s.pod.name proc=%proc.name file=%fd.name
     cmdline=%proc.cmdline user=%user.name)
  priority: CRITICAL
  tags: [cve-2025-1974, d3, token, lfi]

# D3 보조: sh/cat/curl이 토큰 파일을 직접 읽는 경우 (kubectl exec fallback)
- rule: CVE-2025-1974 Shell Reads SA Token in ingress-nginx
  desc: >
    ingress-nginx 파드에서 shell/cat/curl 등이
    ServiceAccount 토큰 파일을 접근함. kubectl exec 공격 패턴.
  condition: >
    (open_read or open_write) and
    fd.name = "/var/run/secrets/kubernetes.io/serviceaccount/token" and
    proc.name in (sh, bash, cat, curl, wget, python3, python) and
    k8s.ns.name = ingress-nginx
  output: >
    Shell/tool reads SA token in ingress-nginx (CVE-2025-1974 D3 variant)
    (pod=%k8s.pod.name proc=%proc.name file=%fd.name
     parent=%proc.pname cmdline=%proc.cmdline)
  priority: CRITICAL
  tags: [cve-2025-1974, d3, token, kubectl-exec]

# ─────────────────────────────────────────────────────────────────────────────
# D4: Container Lateral Movement — Kubernetes API Access
# 컨테이너에서 curl/kubectl이 Kubernetes API 서버에 접근
# ─────────────────────────────────────────────────────────────────────────────
- list: cve_2025_1974_k8s_api_ips
  items: [10.96.0.1]

- list: cve_2025_1974_k8s_api_ports
  items: [443]

- macro: user_known_contact_k8s_api_server_activities
  append: true
  condition: >
    or (k8s.ns.name = default and
     proc.name in (kubectl, curl, wget, python, python3) and
     (fd.sip.name = "kubernetes.default.svc.cluster.local" or
      (fd.sip in (cve_2025_1974_k8s_api_ips) and
       fd.sport in (cve_2025_1974_k8s_api_ports))))

- rule: CVE-2025-1974 Container Calls Kubernetes API
  desc: >
    컨테이너 내부 프로세스가 Kubernetes API 서버(kubernetes.default.svc:443 또는 10.96.0.1:443)에
    직접 연결함. SA 토큰을 이용한 권한 확인 또는 lateral movement 패턴.
  condition: >
    evt.type=connect and
    (fd.typechar=4 or fd.typechar=6) and
    container and
    not k8s.ns.name in (kube-system, falco) and
    (
      fd.sip.name = "kubernetes.default.svc.cluster.local" or
      (fd.sip in (cve_2025_1974_k8s_api_ips) and
       fd.sport in (cve_2025_1974_k8s_api_ports)) or
      (fd.rip in (cve_2025_1974_k8s_api_ips) and
       fd.rport in (cve_2025_1974_k8s_api_ports))
    )
  output: >
    Container calls k8s API (CVE-2025-1974 D4)
    (rule=CVE-2025-1974 Container Calls Kubernetes API priority=WARNING
     pod=%k8s.pod.name ns=%k8s.ns.name proc=%proc.name
     reduced_command=%proc.name connection=%fd.name
     sip=%fd.sip sport=%fd.sport rip=%fd.rip rport=%fd.rport)
  priority: WARNING
  tags: [cve-2025-1974, d4, lateral-movement, api]

- rule: CVE-2025-1974 kubectl in Container
  desc: >
    컨테이너 내부에서 kubectl 명령이 실행됨.
    탈취한 SA 토큰으로 API 접근하는 공격자 패턴.
  condition: >
    spawned_process and
    proc.name = kubectl and
    container and
    not k8s.ns.name in (kube-system)
  output: >
    kubectl executed inside container (CVE-2025-1974 D4)
    (rule=CVE-2025-1974 kubectl in Container priority=WARNING
     pod=%k8s.pod.name ns=%k8s.ns.name proc=%proc.name
     reduced_command=%proc.name parent=%proc.pname user=%user.name)
  priority: WARNING
  tags: [cve-2025-1974, d4, lateral-movement, kubectl]
